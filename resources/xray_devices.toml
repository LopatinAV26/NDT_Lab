notation = "Необходимо понимать, что рентгеновские плёнки и, особенно экраны имеют разброс по чувствительности, а рентгеновские аппараты - неизбежный технологический разброс параметров, поэтому рассчитанное по номограммам время не является точным, а служит только для предварительной оценки. При расчёте номограмм используются усреднённые паспортные значения чувствительности плёнок и экранов, а также линейных коэффициентов ослабления рентгеновского излучения в материалах. В каждом конкретном случае сочетание параметров может быть иным и время экспозиции может несколько отличаться от рассчитанного по номограммам. Также на итоговую оптическую плотность рентгеновского снимка влияет тип/марка проявителя, его концентрация, температура и время проявки."
